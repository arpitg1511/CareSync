server.port=${PORT:8084}
spring.application.name=appointment-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://caresync-db.cduc4o4kscep.ap-southeast-2.rds.amazonaws.com:3306/caresync_appointment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:arpit123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# Hibernate 🦾
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Security (JWT)
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000

# Inter-service URLs - Fix circular references
patient.service.url=${PATIENT_SERVICE_URL:http://localhost:8083}
provider.service.url=${PROVIDER_SERVICE_URL:http://localhost:8082}
schedule.service.url=${SCHEDULE_SERVICE_URL:http://localhost:8085}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8089}
