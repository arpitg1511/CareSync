# OAuth2 (Defaults added to allow startup)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github-secret}
