server.port=${PORT:8081}
spring.application.name=auth-service

# Database (AWS RDS Production) 🛰️
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://caresync-db.cduc4o4kscep.ap-southeast-2.rds.amazonaws.com:3306/caresync_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
