server.port=8081
spring.application.name=auth-service

# Database (medibook_auth)
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/medibook_auth?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate 🦾
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security (JWT)
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000

# OAuth2 (Defaults added to allow startup)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github-secret}
spring.security.oauth2.client.registration.github.scope=user:email
