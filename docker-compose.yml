version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: caresync-rabbitmq
    ports:
      - "5672:5672"   # RabbitMQ port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - caresync-network

networks:
  caresync-network:
    driver: bridge
