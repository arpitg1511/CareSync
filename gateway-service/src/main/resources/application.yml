server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-gateway-request-chain: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: auth-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth-docs/v3/api-docs
          filters:
            - RewritePath=/auth-docs/v3/api-docs, /v3/api-docs

        - id: provider-service
          uri: ${PROVIDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/providers/**, /api/admin/**
          filters:
            - RewritePath=/api/admin/(?<segment>.*), /api/providers/admin/$\{segment}

        - id: provider-docs
          uri: ${PROVIDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/provider-docs/v3/api-docs
          filters:
            - RewritePath=/provider-docs/v3/api-docs, /v3/api-docs

        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/patients/**

        - id: patient-docs
          uri: ${PATIENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/patient-docs/v3/api-docs
          filters:
            - RewritePath=/patient-docs/v3/api-docs, /v3/api-docs

        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/appointments/**

        - id: appointment-docs
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/appointment-docs/v3/api-docs
          filters:
            - RewritePath=/appointment-docs/v3/api-docs, /v3/api-docs

        - id: schedule-service
          uri: ${SCHEDULE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/slots/**

        - id: schedule-docs
          uri: ${SCHEDULE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/schedule-docs/v3/api-docs
          filters:
            - RewritePath=/schedule-docs/v3/api-docs, /v3/api-docs

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/payments/**

        - id: payment-docs
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/payment-docs/v3/api-docs
          filters:
            - RewritePath=/payment-docs/v3/api-docs, /v3/api-docs

        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/reviews/**

        - id: review-docs
          uri: ${REVIEW_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/review-docs/v3/api-docs
          filters:
            - RewritePath=/review-docs/v3/api-docs, /v3/api-docs

        - id: record-service
          uri: ${RECORD_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/records/**

        - id: record-docs
          uri: ${RECORD_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/record-docs/v3/api-docs
          filters:
            - RewritePath=/record-docs/v3/api-docs, /v3/api-docs

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/notifications/**

        - id: notification-docs
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/notification-docs/v3/api-docs
          filters:
            - RewritePath=/notification-docs/v3/api-docs, /v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /auth-docs/v3/api-docs
      - name: Provider Service
        url: /provider-docs/v3/api-docs
      - name: Patient Service
        url: /patient-docs/v3/api-docs
      - name: Appointment Service
        url: /appointment-docs/v3/api-docs
      - name: Schedule Service
        url: /schedule-docs/v3/api-docs
      - name: Payment Service
        url: /payment-docs/v3/api-docs
      - name: Review Service
        url: /review-docs/v3/api-docs
      - name: Medical Record Service
        url: /record-docs/v3/api-docs
      - name: Notification Service
        url: /notification-docs/v3/api-docs
