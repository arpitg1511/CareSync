server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**, /api/auth/**
            
        - id: provider-service
          uri: ${PROVIDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/providers/**, /api/admin/**

        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/patients/**

        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/appointments/**, /api/appointments/**

        - id: schedule-service
          uri: ${SCHEDULE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/slots/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/payments/**

        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/reviews/**

        - id: record-service
          uri: ${RECORD_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/records/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/notifications/**
